# Server
server.port=8080

# H2 Database - test db
spring.datasource.url=jdbc:h2:mem:qrqate
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# QR Auth Settings
qrgate.token.expiry-seconds=90
# IMPORTANT: For mobile scanning to work, change 'localhost' to your machine's local IP address
# e.g., http://192.168.1.5:8080
qrgate.base-url=http://192.168.1.98:8080

# JWT Settings
qrgate.jwt.secret=${JWT_SECRET:v9y$B&E)H@McQfTjWnZr4u7x!A%D*G-KaNdRgUkXp2s5v8y/B?E(H+MbQeShVmYq}
qrgate.jwt.expiry-ms=86400000